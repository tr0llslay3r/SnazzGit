name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  rust-tests:
    name: Rust unit tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system libraries (Tauri dependencies)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Run Rust tests with coverage
        working-directory: src-tauri
        run: cargo llvm-cov --lib --lcov --output-path ../lcov-rust.info

      - name: Print Rust coverage summary
        working-directory: src-tauri
        run: cargo llvm-cov --lib --no-run --text

      - name: Upload Rust LCOV report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: lcov-rust.info

  typescript-tests:
    name: TypeScript unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate SvelteKit types
        run: npm run prepare

      - name: Run TypeScript tests with coverage
        run: npm run test:coverage

      - name: Upload TypeScript coverage report
        uses: actions/upload-artifact@v4
        with:
          name: typescript-coverage
          path: coverage/
